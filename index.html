<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#05060A">
<meta name="description" content="Splash screen aplikasi Absensi Santri - Ma'had Tahfidz IDN Bantul">
<title>Absensi Santri</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* =====================================================================
   VARIABEL WARNA — Tema BMW M (biru / violet / merah), latar navy → hitam
   ===================================================================== */
:root{
  --navy:       #05060A;
  --navy-2:     #071522;
  --black:      #0B0B0D;
  --blue:       #0058A3;
  --blue-light: #3E8FD6;
  --violet:     #6E2585;
  --red:        #E4002B;
  --text:       #F5F6F8;
  --text-dim:   rgba(245,246,248,0.72);
  --glass-bg:   rgba(255,255,255,0.05);
  --glass-brd:  rgba(255,255,255,0.14);
  --safe-top:   env(safe-area-inset-top, 0px);
  --safe-bot:   env(safe-area-inset-bottom, 0px);
}

*{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  height:100%;
  background:var(--navy);
  overflow:hidden;
  font-family:'Inter',sans-serif;
}

/* =====================================================================
   ROOT SPLASH — panggung utama, semua lapisan latar & konten di dalamnya
   ===================================================================== */
.splash-root{
  position:relative;
  width:100%; height:100vh; height:100dvh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:22px;
  padding: calc(var(--safe-top) + 24px) 24px calc(var(--safe-bot) + 24px);
  background:
    radial-gradient(ellipse at 20% 15%, rgba(0,88,163,0.25), transparent 55%),
    radial-gradient(ellipse at 85% 80%, rgba(110,37,133,0.22), transparent 55%),
    linear-gradient(160deg, var(--navy) 0%, var(--navy-2) 45%, var(--black) 100%);
  transition: filter .8s ease, opacity .8s ease;
}
.splash-root.finishing{
  filter: blur(6px);
  opacity: 0;
}

/* =====================================================================
   LAPISAN LATAR — grid digital, hexagon tipis, garis data, scan-line, glow
   ===================================================================== */
.bg-layer{ position:absolute; inset:0; pointer-events:none; }

/* Grid digital tipis */
.bg-grid{
  background-image:
    linear-gradient(rgba(62,143,214,0.09) 1px, transparent 1px),
    linear-gradient(90deg, rgba(62,143,214,0.09) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: radial-gradient(ellipse at 50% 40%, black 20%, transparent 75%);
  animation: gridDrift 18s linear infinite;
}
@keyframes gridDrift{
  0%{ background-position: 0 0, 0 0; }
  100%{ background-position: 42px 84px, 84px 42px; }
}

/* Pola hexagon islamic-geometric, sangat transparan */
.bg-hexagon{
  opacity:.06;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='56' height='100' viewBox='0 0 56 100'><path d='M28 0 L56 25 L56 75 L28 100 L0 75 L0 25 Z' fill='none' stroke='%233E8FD6' stroke-width='1'/></svg>");
  background-size: 56px 100px;
}

/* Garis scanning yang bergerak turun perlahan */
.scan-line{
  position:absolute; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, var(--blue-light), var(--violet), transparent);
  box-shadow:0 0 16px 2px rgba(62,143,214,.6);
  animation: scanMove 4.5s ease-in-out infinite;
}
@keyframes scanMove{
  0%{ top:8%; opacity:0; }
  10%{ opacity:.9; }
  50%{ top:55%; opacity:.9; }
  90%{ opacity:0; }
  100%{ top:92%; opacity:0; }
}

/* Glow orb besar, berdenyut pelan */
.glow-orb{ position:absolute; border-radius:50%; filter:blur(50px); animation:orbPulse 6s ease-in-out infinite; }
.glow-orb.o1{ width:260px; height:260px; left:-60px; top:8%; background:radial-gradient(circle, rgba(0,88,163,.55), transparent 70%); }
.glow-orb.o2{ width:220px; height:220px; right:-50px; bottom:10%; background:radial-gradient(circle, rgba(110,37,133,.5), transparent 70%); animation-delay:1.5s; }
.glow-orb.o3{ width:160px; height:160px; right:15%; top:6%; background:radial-gradient(circle, rgba(228,0,43,.35), transparent 70%); animation-delay:3s; }
@keyframes orbPulse{
  0%,100%{ transform:scale(1); opacity:.55; }
  50%{ transform:scale(1.18); opacity:.85; }
}

/* Garis "data stream" vertikal tipis mengalir turun */
.data-stream{ position:absolute; top:-20%; width:1px; height:40%; opacity:.5;
  background:linear-gradient(180deg, transparent, var(--blue-light), transparent);
  animation:streamFall 3.2s linear infinite;
}
@keyframes streamFall{ 0%{ transform:translateY(-40%); opacity:0; } 15%{opacity:.6;} 85%{opacity:.6;} 100%{ transform:translateY(340%); opacity:0; } }

/* Partikel titik mengambang (dibuat via JavaScript) */
.particle{
  position:absolute; border-radius:50%;
  background:var(--blue-light);
  box-shadow:0 0 6px 1px rgba(62,143,214,.7);
  animation-name: floatParticle;
  animation-timing-function: ease-in-out;
  animation-iteration-count: infinite;
}
@keyframes floatParticle{
  0%{ transform:translate(0,0); opacity:0; }
  15%{ opacity:.8; }
  50%{ transform:translate(var(--dx,12px), var(--dy,-70px)); opacity:.9; }
  85%{ opacity:.4; }
  100%{ transform:translate(calc(var(--dx,12px) * 1.6), calc(var(--dy,-70px) * 1.9)); opacity:0; }
}

/* =====================================================================
   LOGO — kaca (glass), ring berputar warna brand, glow, floating
   ===================================================================== */
.logo-wrap{
  position:relative; width:132px; height:132px;
  display:flex; align-items:center; justify-content:center;
  animation: logoFloat 4.5s ease-in-out infinite;
  z-index:2;
}
@keyframes logoFloat{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-10px); }
}

.logo-ring{
  position:absolute; inset:-10px; border-radius:50%;
  background:conic-gradient(from 0deg, var(--blue), var(--violet), var(--red), var(--blue));
  -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
          mask:radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
  animation: ringSpin 5s linear infinite;
  opacity:.9;
}
@keyframes ringSpin{ to{ transform:rotate(360deg); } }

.logo-glass{
  position:relative; width:112px; height:112px; border-radius:50%;
  background:var(--glass-bg);
  border:1px solid var(--glass-brd);
  backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center;
  box-shadow:
    0 0 30px 4px rgba(0,88,163,.45),
    inset 0 1px 0 rgba(255,255,255,.25);
  animation: logoPulse 3.2s ease-in-out infinite;
  overflow:hidden;
}
@keyframes logoPulse{
  0%,100%{ box-shadow:0 0 26px 3px rgba(0,88,163,.4), inset 0 1px 0 rgba(255,255,255,.25); }
  50%{ box-shadow:0 0 42px 8px rgba(0,88,163,.65), inset 0 1px 0 rgba(255,255,255,.3); }
}
.logo-glass img{
  width:76px; height:76px; object-fit:contain; border-radius:16px;
}

/* =====================================================================
   TEKS — judul & subjudul
   ===================================================================== */
.app-title{
  font-family:'Sora',sans-serif; font-weight:800; font-size:26px; letter-spacing:1px;
  color:var(--text); text-align:center;
  text-shadow:0 0 18px rgba(62,143,214,.55);
  opacity:0; transform:translateY(14px);
  animation: fadeUp .7s ease-out .35s forwards;
}
.app-subtitle{
  font-size:13.5px; color:var(--text-dim); text-align:center; letter-spacing:.3px;
  opacity:0; transform:translateY(10px);
  animation: fadeUp .7s ease-out .75s forwards;
}
@keyframes fadeUp{ to{ opacity:1; transform:translateY(0); } }

/* =====================================================================
   LOADING — progress bar futuristik + persentase + teks bergantian
   ===================================================================== */
.loading-wrap{
  width:min(280px, 78vw);
  display:flex; flex-direction:column; align-items:center; gap:10px;
  opacity:0; animation: fadeUp .7s ease-out 1.1s forwards;
  z-index:2;
}
.progress-track{
  position:relative; width:100%; height:8px; border-radius:99px;
  background:var(--glass-bg); border:1px solid var(--glass-brd); overflow:hidden;
}
.progress-fill{
  position:relative; height:100%; width:0%; border-radius:99px;
  background:linear-gradient(90deg, var(--blue), var(--violet), var(--red));
  transition:width .15s linear;
}
.progress-fill::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(110deg, transparent 30%, rgba(255,255,255,.55) 50%, transparent 70%);
  background-size:200% 100%;
  animation: shineSweep 1.4s linear infinite;
}
@keyframes shineSweep{ 0%{ background-position:150% 0; } 100%{ background-position:-50% 0; } }

.progress-meta{ display:flex; justify-content:space-between; width:100%; font-size:11.5px; color:var(--text-dim); }
.progress-percent{ font-variant-numeric:tabular-nums; font-weight:600; color:var(--text); }
.loading-text{ min-height:16px; transition:opacity .25s ease; }

/* =====================================================================
   RESPONSIVE & AKSESIBILITAS
   ===================================================================== */
@media (max-width:360px){
  .app-title{ font-size:22px; }
  .logo-wrap{ width:112px; height:112px; }
  .logo-glass{ width:96px; height:96px; }
  .logo-glass img{ width:64px; height:64px; }
}
@media (orientation:landscape) and (max-height:480px){
  .splash-root{ gap:14px; padding-top:calc(var(--safe-top) + 10px); padding-bottom:calc(var(--safe-bot) + 10px); }
  .logo-wrap{ width:88px; height:88px; }
  .logo-glass{ width:76px; height:76px; }
  .logo-glass img{ width:52px; height:52px; }
  .app-title{ font-size:20px; }
}

/* Hormati preferensi pengguna yang sensitif terhadap animasi */
@media (prefers-reduced-motion: reduce){
  .bg-grid, .scan-line, .glow-orb, .data-stream, .particle, .logo-ring, .logo-wrap, .logo-glass{
    animation:none !important;
  }
}
.reduced-motion .bg-grid,
.reduced-motion .scan-line,
.reduced-motion .glow-orb,
.reduced-motion .data-stream,
.reduced-motion .particle,
.reduced-motion .logo-ring,
.reduced-motion .logo-wrap,
.reduced-motion .logo-glass{
  animation:none !important;
}
</style>
</head>
<body>

<!-- ROOT SPLASH SCREEN -->
<main class="splash-root" id="splashRoot" role="status" aria-live="polite" aria-label="Memuat aplikasi Absensi Santri">

  <!-- Lapisan latar dekoratif (tidak dibaca screen reader) -->
  <div class="bg-layer bg-grid" aria-hidden="true"></div>
  <div class="bg-layer bg-hexagon" aria-hidden="true"></div>
  <div class="bg-layer glow-orb o1" aria-hidden="true"></div>
  <div class="bg-layer glow-orb o2" aria-hidden="true"></div>
  <div class="bg-layer glow-orb o3" aria-hidden="true"></div>
  <div class="bg-layer scan-line" aria-hidden="true"></div>
  <div class="bg-layer" id="particleField" aria-hidden="true"></div>
  <div class="bg-layer" id="streamField" aria-hidden="true"></div>

  <!-- Logo -->
  <div class="logo-wrap" id="logoWrap">
    <div class="logo-ring" aria-hidden="true"></div>
    <div class="logo-glass">
      <img src="icons/icon-192.png" alt="Logo Ma'had Tahfidz IDN Bantul">
    </div>
  </div>

  <!-- Judul & Subjudul -->
  <h1 class="app-title">Absensi Santri</h1>
  <p class="app-subtitle">Ma'had Tahfidz IDN Bantul</p>

  <!-- Loading -->
  <div class="loading-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-meta">
      <span class="loading-text" id="loadingText">Memuat Sistem...</span>
      <span class="progress-percent" id="progressPercent">0%</span>
    </div>
  </div>
</main>

<script>
/* =====================================================================
  JAVASCRIPT — partikel latar, progress loading, transisi, redirect
  ===================================================================== */
(function(){
  'use strict';

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReducedMotion) {
    document.getElementById('splashRoot').classList.add('reduced-motion');
  }

  /* --- Buat partikel titik mengambang secara acak (ringan, hemat performa) --- */
  function buatPartikel(jumlah){
    if (prefersReducedMotion) return; // hormati preferensi kurangi animasi
    const field = document.getElementById('particleField');
    const frag = document.createDocumentFragment();
    for (let i = 0; i < jumlah; i++){
      const p = document.createElement('span');
      p.className = 'particle';
      const size = 2 + Math.random() * 3;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = 40 + Math.random() * 55 + '%';
      p.style.setProperty('--dx', (Math.random() * 40 - 20) + 'px');
      p.style.setProperty('--dy', (-(60 + Math.random() * 90)) + 'px');
      p.style.animationDuration = (3 + Math.random() * 3) + 's';
      p.style.animationDelay = (Math.random() * 3) + 's';
      frag.appendChild(p);
    }
    field.appendChild(frag);
  }

  /* --- Buat beberapa garis "data stream" vertikal --- */
  function buatDataStream(jumlah){
    if (prefersReducedMotion) return;
    const field = document.getElementById('streamField');
    const frag = document.createDocumentFragment();
    for (let i = 0; i < jumlah; i++){
      const s = document.createElement('span');
      s.className = 'data-stream';
      s.style.left = (10 + Math.random() * 80) + '%';
      s.style.animationDuration = (2.4 + Math.random() * 2) + 's';
      s.style.animationDelay = (Math.random() * 2.5) + 's';
      frag.appendChild(s);
    }
    field.appendChild(frag);
  }

  buatPartikel(22);
  buatDataStream(6);

  /* --- Progress bar + teks loading bergantian, total ±3 detik --- */
  const pesanLoading = [
    'Memuat Sistem...',
    'Menghubungkan Database...',
    'Sinkronisasi Data...',
    'Menyiapkan Dashboard...',
    'Hampir Selesai...'
  ];

  const DURASI_TOTAL = 3000;     // total durasi progress (ms)
  const INTERVAL_TICK = 30;      // seberapa sering progress di-update (ms)
  const langkahPerTick = 100 / (DURASI_TOTAL / INTERVAL_TICK);

  let persen = 0;
  let indexPesan = 0;

  const elFill = document.getElementById('progressFill');
  const elPercent = document.getElementById('progressPercent');
  const elText = document.getElementById('loadingText');

  // Ganti teks loading setiap (DURASI_TOTAL / jumlah pesan)
  const intervalPesan = setInterval(function(){
    indexPesan = (indexPesan + 1) % pesanLoading.length;
    elText.style.opacity = 0;
    setTimeout(function(){
      elText.textContent = pesanLoading[indexPesan];
      elText.style.opacity = 1;
    }, 150);
  }, DURASI_TOTAL / pesanLoading.length);

  const intervalProgress = setInterval(function(){
    persen = Math.min(100, persen + langkahPerTick);
    elFill.style.width = persen + '%';
    elPercent.textContent = Math.round(persen) + '%';

    if (persen >= 100){
      clearInterval(intervalProgress);
      clearInterval(intervalPesan);
      elText.textContent = 'Selesai';
      setTimeout(mulaiTransisiKeluar, 350);
    }
  }, INTERVAL_TICK);

  /* --- Transisi keluar: logo membesar & glow meningkat, lalu fade out --- */
  function mulaiTransisiKeluar(){
    const root = document.getElementById('splashRoot');
    const logo = document.getElementById('logoWrap');

    logo.style.transform = 'scale(1.12)';
    logo.style.filter = 'drop-shadow(0 0 26px rgba(62,143,214,.8))';

    requestAnimationFrame(function(){
      root.classList.add('finishing');
    });

    // Tunggu animasi fade out (lihat CSS: transition .8s) baru pindah halaman
    setTimeout(goToHome, 800);
  }

  /* =====================================================================
    FUNGSI PERPINDAHAN HALAMAN
    Ganti "app.html" di bawah sesuai nama file halaman utama aplikasi kamu.
  ===================================================================== */
  function goToHome(){
    window.location.href = "app.html";
  }

  // Fallback: kalau karena suatu sebab timer gagal jalan, tetap pindah
  // halaman maksimal setelah 6 detik supaya pengguna tidak terjebak di splash.
  setTimeout(function(){
    if (document.getElementById('splashRoot')) goToHome();
  }, 6000);

})();
</script>
</body>
</html>
