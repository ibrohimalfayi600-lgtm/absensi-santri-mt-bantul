<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0B0B0D">
<meta name="description" content="Aplikasi Absensi Santri Ma'had Tahfizh">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>Absensi Santri · Ma'had Tahfizh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="config.js"></script>
<style>
:root{
  --bg:#0B0B0D; --surface:#151518; --surface2:#1C1C20; --border:#2A2A2E;
  --blue:#0058A3; --violet:#6E2585; --red:#E4002B;
  --text:#F2F2F3; --text-dim:#9A9AA2;
  --hadir:#1FAA59; --telat:#FF7A1A; --izin:#F2A900; --sakit:#6E2585; --alpha:#E4002B;
  --radius:2px;
}
:root[data-theme="light"]{
  --bg:#F2F2F4; --surface:#FFFFFF; --surface2:#F1F1F3; --border:#DEDEE2;
  --text:#141416; --text-dim:#6B6B74;
}
:root[data-theme="light"] .stat-num,
:root[data-theme="light"] .brand,
:root[data-theme="light"] h1, :root[data-theme="light"] h2, :root[data-theme="light"] h3{ color:var(--text); }
:root[data-theme="light"] .kegiatan-item .nama-kegiatan{ color:var(--text); }
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
h1,h2,h3,.brand,.stat-num{font-family:'Sora',sans-serif;}
.hidden{display:none !important;}
button{cursor:pointer;font-family:'Inter',sans-serif;border:none;}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--blue);outline-offset:2px;}
input,select,textarea{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:10px 12px;border-radius:var(--radius);font-size:14px;width:100%;font-family:inherit;
}
::placeholder{color:var(--text-dim);}

/* ---------- stripe accent ---------- */
.mstripe{height:4px;width:100%;background:linear-gradient(90deg,var(--blue) 0 33%,var(--violet) 33% 66%,var(--red) 66% 100%);}
.mstripe-vert{width:4px;align-self:stretch;background:linear-gradient(180deg,var(--blue),var(--violet),var(--red));}

/* ---------- LOGIN ---------- */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 30% 20%,#151518,#0B0B0D 70%);padding:16px;}
.login-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.login-body{padding:32px 28px;}
.login-logo{font-size:22px;font-weight:800;letter-spacing:.5px;margin-bottom:4px;}
.login-logo-img{width:64px;height:64px;display:block;margin-bottom:12px;border-radius:12px;}
.brand{display:flex;align-items:center;gap:8px;}
.brand-icon{width:22px;height:22px;border-radius:4px;}
.login-sub{color:var(--text-dim);font-size:13px;margin-bottom:24px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 20px;border-radius:var(--radius);font-weight:700;font-size:13px;
  text-transform:uppercase;letter-spacing:.6px;transition:filter .15s ease-out,transform .15s ease-out;
}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--red);color:#fff;width:100%;}
.btn-primary:hover{filter:brightness(1.1);}
.btn-outline{background:transparent;border:1px solid var(--blue);color:var(--blue);}
.btn-outline:hover{background:rgba(0,88,163,.12);}
.btn-ghost{background:transparent;color:var(--text-dim);}
.btn-ghost:hover{color:var(--text);}
.btn-sm{padding:8px 12px;font-size:12px;}
.login-error{color:var(--red);font-size:13px;margin-top:10px;min-height:16px;}

/* ---------- APP SHELL ---------- */
#appView{min-height:100vh;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);}
.topbar .brand{font-size:16px;font-weight:800;}
.topbar .user-info{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text-dim);}
.main-wrap{flex:1;display:flex;}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;}
.sidebar button{display:block;width:100%;text-align:left;padding:12px 20px;background:transparent;color:var(--text-dim);font-size:14px;font-weight:600;border-left:3px solid transparent;}
.sidebar button:hover{color:var(--text);background:var(--surface2);}
.sidebar button.active{color:var(--text);border-left-color:var(--red);background:var(--surface2);}
.content{flex:1;padding:24px;max-width:1200px;}
.page-title{font-size:20px;font-weight:800;margin:0 0 4px;}
.page-sub{color:var(--text-dim);font-size:13px;margin:0 0 20px;}

/* bottom nav mobile */
.bottomnav{display:none;position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);}
.bottomnav .mstripe{position:absolute;top:-4px;left:0;}
.bottomnav-inner{display:flex;}
.bottomnav button{flex:1;padding:10px 4px;background:transparent;color:var(--text-dim);font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;}
.bottomnav button.active{color:var(--red);}

@media (max-width: 768px){
  .sidebar{display:none;}
  .bottomnav{display:block;}
  .content{padding:16px;padding-bottom:80px;}
}

/* ---------- CARDS ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.card-body{padding:18px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;}
.stat-card .mstripe{position:absolute;top:0;left:0;}
.stat-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.stat-num{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;}

/* ---------- kegiatan list (ustadz dashboard) ---------- */
.kegiatan-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.kegiatan-item .nama-kegiatan{font-weight:700;font-size:15px;margin-bottom:10px;}
.kelas-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border);}
.kelas-row:first-of-type{border-top:none;}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--radius);text-transform:uppercase;letter-spacing:.4px;}
.badge-done{background:rgba(31,170,89,.15);color:var(--hadir);}
.badge-pending{background:rgba(228,0,43,.12);color:var(--red);}

/* ---------- absensi ---------- */
.absensi-header{position:sticky;top:0;background:var(--bg);padding:10px 0;z-index:5;}
.hadir-semua-btn{width:100%;background:var(--red);color:#fff;padding:12px;border-radius:var(--radius);font-weight:700;text-transform:uppercase;letter-spacing:.6px;font-size:13px;margin-bottom:12px;}
.santri-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;}
.santri-nama{font-weight:600;margin-bottom:8px;font-size:14px;}
.segctrl{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.segctrl button{padding:8px 2px;font-size:10.5px;font-weight:700;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);transition:all .15s ease-out;}
.seg-hadir.active{background:var(--hadir);border-color:var(--hadir);color:#fff;}
.seg-telat.active{background:var(--telat);border-color:var(--telat);color:#111;}
.seg-izin.active{background:var(--izin);border-color:var(--izin);color:#111;}
.seg-sakit.active{background:var(--sakit);border-color:var(--sakit);color:#fff;}
.seg-alpha.active{background:var(--alpha);border-color:var(--alpha);color:#fff;}
.telat-menit-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center;}
.menit-chip{padding:6px 10px;font-size:11px;font-weight:700;border-radius:14px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);}
.menit-chip.active{background:var(--telat);border-color:var(--telat);color:#111;}
.menit-custom{width:70px;padding:6px 8px;font-size:12px;}
.absensi-footer{position:sticky;bottom:0;background:var(--bg);padding:12px 0 4px;}

/* ---------- table ---------- */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--text-dim);text-transform:uppercase;font-size:11px;letter-spacing:.4px;padding:10px 12px;border-bottom:1px solid var(--border);}
td{padding:10px 12px;border-bottom:1px solid var(--border);}
tr:hover td{background:var(--surface2);}
.table-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.status-pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:var(--radius);}
.pill-Hadir{background:rgba(31,170,89,.15);color:var(--hadir);}
.pill-Telat{background:rgba(255,122,26,.15);color:var(--telat);}
.pill-Izin{background:rgba(242,169,0,.15);color:var(--izin);}
.pill-Sakit{background:rgba(110,37,133,.25);color:#c084d8;}
.pill-Alpha{background:rgba(228,0,43,.15);color:var(--red);}

/* ---------- ranking / leaderboard ---------- */
.rank-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.rank-card-head{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.rank-row:last-child{border-bottom:none;}
.rank-row:hover{background:var(--surface2);}
.rank-medal{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.rank-nama{flex:1;font-size:13px;font-weight:600;}
.rank-val{font-size:12px;font-weight:700;color:var(--text-dim);}

/* ---------- filter bar / forms ---------- */
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.filter-bar > *{flex:1;min-width:130px;}
.filter-bar .btn{flex:0 0 auto;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media (max-width:600px){.form-grid{grid-template-columns:1fr;}}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim);}

/* ---------- toast ---------- */
#toastWrap{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--blue);padding:12px 16px;border-radius:var(--radius);font-size:13px;min-width:220px;box-shadow:0 6px 18px rgba(0,0,0,.4);}
.toast.error{border-left-color:var(--red);}
.toast.success{border-left-color:var(--hadir);}

/* ---------- laporan ---------- */
.pill-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.pill-btn{padding:9px 16px;border-radius:20px;font-size:12px;font-weight:700;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px;}
.pill-btn.active{background:var(--red);border-color:var(--red);color:#fff;}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr;}}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.chart-card h3{margin:0 0 12px;font-size:14px;}
.chart-card canvas{max-height:280px;}
.bar-track{background:var(--surface2);border-radius:var(--radius);height:8px;overflow:hidden;}
.bar-fill{height:100%;background:var(--hadir);}

.loading-overlay{position:fixed;inset:0;background:rgba(11,11,13,.6);display:flex;align-items:center;justify-content:center;z-index:998;}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important;}}

/* ---------- PRINT / EXPORT PDF ---------- */
.print-only{display:none;}
@media print{
  .sidebar, .bottomnav, .topbar, .filter-bar, .pill-group, .toolbar,
  .btn, #toastWrap, .loading-overlay, .print-hide { display:none !important; }
  body{background:#fff;color:#000;}
  .content{padding:0;max-width:none;}
  .card, .chart-card, .stat-card, .table-wrap{background:#fff;border:1px solid #ccc;color:#000;break-inside:avoid;}
  .stat-label{color:#555;}
  th{color:#555;border-bottom:1px solid #999;}
  td{border-bottom:1px solid #ddd;color:#000;}
  .chart-grid{grid-template-columns:1fr 1fr;}
  .print-only{display:block;margin-bottom:12px;}
  a[href]:after{content:"";}
}
</style>
</head>
<body>
<script>
  (function(){
    try {
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch(e){}
  })();
</script>

<!-- ================= LOGIN ================= -->
<div id="loginView">
  <div class="login-card">
    <div class="mstripe"></div>
    <div class="login-body">
      <img src="icons/icon-192.png" alt="Ma'had Tahfizh" class="login-logo-img">
      <div class="login-logo">MA'HAD TAHFIZH</div>
      <div class="login-sub">Aplikasi Absensi Santri — Masuk untuk melanjutkan</div>
      <div class="field">
        <label>Username</label>
        <input id="loginUsername" type="text" placeholder="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="loginPassword" type="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" id="btnLogin" onclick="handleLogin()">Masuk</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="appView" class="hidden">
  <div class="topbar">
    <div class="brand"><img src="icons/icon-32.png" alt="" class="brand-icon">MA'HAD TAHFIZH</div>
    <div class="user-info">
      <span id="userNama"></span>
      <button class="btn btn-ghost btn-sm" id="themeToggleBtn" onclick="toggleTheme()">☀️</button>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()">Keluar</button>
    </div>
  </div>
  <div class="main-wrap">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
  <div class="bottomnav">
    <div class="mstripe" style="position:relative;"></div>
    <div class="bottomnav-inner" id="bottomnavInner"></div>
  </div>
</div>

<div id="toastWrap"></div>
<div class="loading-overlay hidden" id="loadingOverlay"><div class="spinner"></div></div>

<script>
// API_URL didefinisikan di config.js (diisi dengan URL deploy Apps Script kamu)
if (typeof API_URL === 'undefined' || !API_URL || API_URL.indexOf('PASTE_URL') !== -1) {
  document.addEventListener('DOMContentLoaded', function(){
    document.getElementById('loginError').textContent =
      '⚠️ API_URL belum diisi. Edit file config.js dan isi dengan URL deploy Apps Script kamu.';
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function () {
      /* diam-diam gagal; tidak mengganggu fungsi utama aplikasi */
    });
  });
}

/* ============================================================
   STATE
============================================================ */
let CURRENT_USER = null;
let REF = null; // referensi awal (kelas, kegiatan, ustadz)
let CURRENT_VIEW = null;
let ABSENSI_STATE = null; // sesi absensi yang sedang diedit

/* ============================================================
   HELPERS UMUM
============================================================ */
function showLoading(){ document.getElementById('loadingOverlay').classList.remove('hidden'); }
function hideLoading(){ document.getElementById('loadingOverlay').classList.add('hidden'); }

function toast(msg, type){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + (type || '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(function(){ el.remove(); }, 3500);
}

function call(fnName, args, onSuccess, onError){
  showLoading();

  const url = API_URL + '?action=' + encodeURIComponent(fnName) + '&args=' + encodeURIComponent(JSON.stringify(args || []));

  fetch(url, { method: 'GET' })
    .then(function(res){
      if(!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data){
      hideLoading();
      if(data && data.__error){
        toast('Error: ' + data.message, 'error');
        if(onError) onError(new Error(data.message));
        return;
      }
      onSuccess(data);
    })
    .catch(function(err){
      hideLoading();
      toast('Gagal terhubung ke server: ' + err.message, 'error');
      if(onError) onError(err);
    });
}

function todayStr(){
  const d = new Date();
  const p = n => (n<10?'0':'')+n;
  return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate());
}

function fmtTanggalIndo(str){
  const d = new Date(str + 'T00:00:00');
  const hari = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'][d.getDay()];
  const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'][d.getMonth()];
  return hari + ', ' + d.getDate() + ' ' + bulan + ' ' + d.getFullYear();
}

function esc(str){
  const d = document.createElement('div'); d.textContent = str==null?'':str; return d.innerHTML;
}

/* ============================================================
   TEMA DARK / LIGHT
============================================================ */
function toggleTheme(){
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  try { localStorage.setItem('theme', next); } catch(e){}
  updateThemeButtonIcon();
}
function updateThemeButtonIcon(){
  const btn = document.getElementById('themeToggleBtn');
  if(!btn) return;
  btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '🌙' : '☀️';
}

/* ============================================================
   LOGIN / LOGOUT
============================================================ */
function handleLogin(){
  const u = document.getElementById('loginUsername').value.trim();
  const p = document.getElementById('loginPassword').value;
  document.getElementById('loginError').textContent = '';
  if(!u || !p){ document.getElementById('loginError').textContent = 'Username dan password wajib diisi.'; return; }
  call('doLogin', [u, p], function(res){
    if(!res.success){ document.getElementById('loginError').textContent = res.message; return; }
    CURRENT_USER = res;
    initApp();
  }, function(err){
    document.getElementById('loginError').textContent = err.message;
  });
}

function handleLogout(){
  CURRENT_USER = null;
  document.getElementById('appView').classList.add('hidden');
  document.getElementById('loginView').classList.remove('hidden');
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
}

document.getElementById('loginPassword').addEventListener('keydown', function(e){
  if(e.key === 'Enter') handleLogin();
});

/* ============================================================
   INIT APP
============================================================ */
function initApp(){
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('appView').classList.remove('hidden');
  document.getElementById('userNama').textContent = CURRENT_USER.nama + ' · ' + (CURRENT_USER.role === 'admin' ? 'Admin' : (CURRENT_USER.role === 'ustadz' ? 'Ustadz' : 'Wali Santri'));
  updateThemeButtonIcon();

  if(CURRENT_USER.role === 'wali'){
    document.getElementById('sidebar').innerHTML = '';
    document.getElementById('bottomnavInner').innerHTML = '';
    renderWaliDashboard();
    return;
  }

  call('getReferensiAwal', [], function(ref){
    REF = ref;
    buildNav();
    if(CURRENT_USER.role === 'admin'){
      navigate('admin-dashboard');
    } else {
      navigate('ustadz-dashboard');
    }
  });
}

function buildNav(){
  const isAdmin = CURRENT_USER.role === 'admin';
  const items = isAdmin ? [
    {id:'admin-dashboard', label:'Dashboard', icon:'📊'},
    {id:'admin-santri', label:'Santri', icon:'🧑‍🎓'},
    {id:'admin-ustadz', label:'Ustadz', icon:'👳'},
    {id:'admin-kegiatan', label:'Kegiatan', icon:'📖'},
    {id:'admin-jadwal', label:'Jadwal', icon:'🗓️'},
    {id:'admin-riwayat', label:'Riwayat', icon:'📜'},
    {id:'admin-laporan', label:'Laporan', icon:'📈'},
    {id:'admin-ranking', label:'Ranking', icon:'🏆'},
  ] : [
    {id:'ustadz-dashboard', label:'Dashboard', icon:'🏠'},
    {id:'ustadz-riwayat', label:'Riwayat', icon:'📜'},
  ];

  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = items.map(function(it){
    return '<button data-nav="'+it.id+'" onclick="navigate(\''+it.id+'\')">'+it.icon+'  '+it.label+'</button>';
  }).join('');

  const bottomLabels = isAdmin

function setActiveNav(viewId){
  document.querySelectorAll('[data-nav]').forEach(function(btn){

function navigate(viewId, params){
  CURRENT_VIEW = viewId;
  setActiveNav(viewId.indexOf('admin-') === 0 || viewId.indexOf('ustadz-') === 0 ? viewId : viewId);
  const map = {
    'admin-dashboard': renderAdminDashboard,
    'admin-santri': renderAdminSantri,

    'admin-kegiatan': renderAdminKegiatan,

function renderAbsensi(params){
  const c = document.getElementById('content');
  ABSENSI_STATE = {jadwalId:params.jadwalId, kelasId:params.kelasId, tanggal:params.tanggal, kegiatanId:null, ustadzId:CURRENT_USER.ustadzId, santri:[]};

  c.innerHTML =
    '<button class="btn btn-ghost btn-sm" onclick="navigate(\'ustadz-dashboard\')">← Kembali</button>'+
    '<h1 class="page-title" style="margin-top:8px;">'+esc(params.namaKegiatan)+' · '+esc(params.namaKelas)+'</h1>'+
    '<p class="page-sub">'+fmtTanggalIndo(params.tanggal)+'</p>'+
    '<div class="absensi-header">'+
      '<button class="hadir-semua-btn" onclick="setHadirSemua()">Hadir Semua</button>'+
    '</div>'+
    '<div id="santriRows"><div class="empty-state">Memuat data santri...</div></div>'+
    '<div class="absensi-footer"><button class="btn btn-primary" style="width:100%;" onclick="simpanAbsensiSekarang()">Simpan Absensi</button></div>';

  // cari kegiatanId dari jadwal
  call('getJadwalHariIniUstadz', [CURRENT_USER.ustadzId, params.tanggal], function(res){
    const j = res.jadwal.find(function(x){ return x.jadwalId === params.jadwalId; });
    ABSENSI_STATE.kegiatanId = j ? j.kegiatanId : '';
    ABSENSI_STATE.hari = res.hari;

    call('getSantriUntukAbsensi', [params.kelasId, params.jadwalId, params.tanggal], function(santri){
      ABSENSI_STATE.santri = santri;
      renderSantriRows();
    });
  });
}

function renderSantriRows(){
  const wrap = document.getElementById('santriRows');
  if(!ABSENSI_STATE.santri.length){
    wrap.innerHTML = '<div class="empty-state">Belum ada data santri aktif di kelas ini. Tambahkan lewat menu Admin &gt; Santri.</div>';
    return;
  }
  const MENIT_PRESET = [5,10,15,30,45,60];
  wrap.innerHTML = ABSENSI_STATE.santri.map(function(s, idx){
    const telatWrap = s.status === 'Telat' ? (
      '<div class="telat-menit-wrap">'+
        MENIT_PRESET.map(function(m){
          const active = Number(s.menitTelat) === m ? 'active' : '';
          return '<button type="button" class="menit-chip '+active+'" onclick="setMenitTelat('+idx+','+m+')">'+m+'m</button>';
        }).join('')+
        '<input type="number" min="1" class="menit-custom" placeholder="lainnya" value="'+(MENIT_PRESET.indexOf(Number(s.menitTelat))===-1 && s.menitTelat ? s.menitTelat : '')+'" onchange="setMenitTelat('+idx+', this.value)">'+
      '</div>'
    ) : '';
    return '<div class="santri-row">'+
      '<div class="santri-nama">'+(idx+1)+'. '+esc(s.nama)+'</div>'+
      '<div class="segctrl">'+
        ['Hadir','Telat','Izin','Sakit','Alpha'].map(function(st){
          const cls = 'seg-'+st.toLowerCase();
          const active = s.status === st ? 'active' : '';
          return '<button class="'+cls+' '+active+'" onclick="setStatus('+idx+',\''+st+'\')">'+st+'</button>';
        }).join('')+
      '</div>'+telatWrap+'</div>';
  }).join('');
}

function setMenitTelat(idx, menit){
  ABSENSI_STATE.santri[idx].menitTelat = parseInt(menit, 10) || 0;
  renderSantriRows();
}

function setStatus(idx, status){
  ABSENSI_STATE.santri[idx].status = status;
  if(status === 'Telat' && !ABSENSI_STATE.santri[idx].menitTelat){
    ABSENSI_STATE.santri[idx].menitTelat = 15;
  }
  renderSantriRows();
}

function setHadirSemua(){
  ABSENSI_STATE.santri.forEach(function(s){ s.status = 'Hadir'; });
  renderSantriRows();
}

function simpanAbsensiSekarang(){
  const payload = {
    jadwalId: ABSENSI_STATE.jadwalId,
    kegiatanId: ABSENSI_STATE.kegiatanId,
    ustadzId: ABSENSI_STATE.ustadzId,
    kelasId: ABSENSI_STATE.kelasId,
    tanggal: ABSENSI_STATE.tanggal,
    hari: ABSENSI_STATE.hari,
    inputOleh: CURRENT_USER.username,
    items: ABSENSI_STATE.santri.map(function(s){ return {santriId:s.santriId, status:s.status, keterangan:s.keterangan||'', menitTelat:s.menitTelat||0}; })
  };
  call('simpanAbsensi', [payload], function(res){
    toast('Absensi tersimpan ✓', 'success');
    navigate('ustadz-dashboard');
  });
}

function cariRiwayat(){

    tanggalAkhir: document.getElementById('fTglAkhir').value,

  };

    wrap.innerHTML = '<div class="table-wrap"><table><thead><tr>'+
      '<th>Tanggal</th><th>Santri</th><th>Kelas</th><th>Ustadz</th><th>Kegiatan</th><th>Status</th>'+
      '</tr></thead><tbody>'+
      rows.map(function(r){
        const telatInfo = (r.status === 'Telat' && r.menitTelat) ? ' <span style="color:var(--text-dim);font-size:11px;">('+r.menitTelat+' mnt)</span>' : '';
        return '<tr><td>'+r.tanggal+'</td><td>'+esc(r.namaSantri)+'</td><td>'+esc(r.namaKelas)+'</td>'+

          '<td><span class="status-pill pill-'+r.status+'">'+r.status+'</span>'+telatInfo+'</td></tr>';
      }).join('')+
      '</tbody></table></div>';
  });
}

function loadSantriTable(){

      rows.map(function(s){

          ? '<span class="badge badge-done">'+esc(s.waliUsername)+'</span> <button class="btn btn-ghost btn-sm" onclick="hapusAkunWaliSantri(\''+s.santriId+'\')">Hapus</button>'
          : '<button class="btn btn-outline btn-sm" onclick="buatAkunWali(\''+s.santriId+'\',\''+esc(s.nama).replace(/'/g,"\\'")+'\')">+ Buat Akun</button>';
        return '<tr><td>'+esc(s.nama)+'</td><td>'+esc(s.namaKelas)+'</td>'+
          '<td>'+(s.aktif ? '<span class="badge badge-done">Aktif</span>' : '<span class="badge badge-pending">Nonaktif</span>')+'</td>'+

          '<td style="text-align:right;">'+
          '<button class="btn btn-outline btn-sm" onclick=\'formSantri('+JSON.stringify(s)+')\'>Edit</button> '+
          (s.aktif ? '<button class="btn btn-ghost btn-sm" onclick="nonaktifkanSantri(\''+s.santriId+'\')">Nonaktifkan</button>' : '')+
          '</td></tr>';
      }).join('')+

function buatAkunWali(santriId, namaSantri){
  const username = prompt('Buat username login untuk wali dari "'+namaSantri+'":');
  if(!username) return;
  const password = prompt('Buat password (bebas, minimal 6 karakter):');
  if(!password) return;
  const namaWali = prompt('Nama wali/orang tua (untuk ditampilkan):') || ('Wali ' + namaSantri);
  call('saveAkunWali', [{ santriId: santriId, username: username.trim(), password: password, namaWali: namaWali }], function(res){
    if(!res.success){ toast(res.message, 'error'); return; }
    toast('Akun wali dibuat: ' + username.trim(), 'success');
    loadSantriTable();
  });
}

function hapusAkunWaliSantri(santriId){
  if(!confirm('Hapus akun wali untuk santri ini?')) return;
  call('hapusAkunWali', [santriId], function(res){
    if(!res.success){ toast(res.message, 'error'); return; }
    toast('Akun wali dihapus', 'success');
    loadSantriTable();
  });
}

function simpanJadwalItem(jadwalId){

function hapusJadwalItem(id){

function periodeBtn(id, label){
  return '<button class="pill-btn" data-periode="'+id+'" onclick="setPeriode(\''+id+'\')">'+label+'</button>';
}

function setPeriode(periode){
  LAPORAN_STATE.periode = periode;
  document.querySelectorAll('#periodePills .pill-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-periode') === periode);
  });
  document.getElementById('customRangeWrap').style.display = periode === 'custom' ? 'flex' : 'none';

  if(periode === 'custom'){
    if(!LAPORAN_STATE.tanggalMulai){
      document.getElementById('lTglMulai').value = todayStr();
      document.getElementById('lTglAkhir').value = todayStr();
    }
    return; // menunggu user klik "Terapkan"
  }
  call('getRentangPeriode', [periode, todayStr()], function(range){
    LAPORAN_STATE.tanggalMulai = range.tanggalMulai;
    LAPORAN_STATE.tanggalAkhir = range.tanggalAkhir;
    muatLaporan();
  });
}

function terapkanCustomRange(){
  LAPORAN_STATE.tanggalMulai = document.getElementById('lTglMulai').value;
  LAPORAN_STATE.tanggalAkhir = document.getElementById('lTglAkhir').value;
  if(!LAPORAN_STATE.tanggalMulai || !LAPORAN_STATE.tanggalAkhir){ toast('Isi tanggal mulai & akhir', 'error'); return; }
  muatLaporan();
}

function onGroupByChange(){
  LAPORAN_STATE.groupBy = document.getElementById('lGroupBy').value;
}

function muatLaporan(){
  LAPORAN_STATE.groupBy = document.getElementById('lGroupBy').value;
  LAPORAN_STATE.kelasId = document.getElementById('lKelasFilter').value;
  LAPORAN_STATE.ustadzId = document.getElementById('lUstadzFilter').value;

  document.getElementById('periodeLabel').textContent =
    fmtTanggalIndo(LAPORAN_STATE.tanggalMulai) + '  —  ' + fmtTanggalIndo(LAPORAN_STATE.tanggalAkhir);
  const printLabelEl = document.getElementById('printPeriodeLabel');
  if(printLabelEl){
    const groupLabel = LAPORAN_STATE.groupBy === 'santri' ? 'Per Santri' : (LAPORAN_STATE.groupBy === 'kelas' ? 'Per Kelas' : 'Per Ustadz');
    printLabelEl.textContent = groupLabel + ' · ' + fmtTanggalIndo(LAPORAN_STATE.tanggalMulai) + ' — ' + fmtTanggalIndo(LAPORAN_STATE.tanggalAkhir);
  }

  const filterRekap = {
    tanggalMulai: LAPORAN_STATE.tanggalMulai, tanggalAkhir: LAPORAN_STATE.tanggalAkhir,
    groupBy: LAPORAN_STATE.groupBy, kelasId: LAPORAN_STATE.kelasId, ustadzId: LAPORAN_STATE.ustadzId
  };
  const filterTren = {
    tanggalMulai: LAPORAN_STATE.tanggalMulai, tanggalAkhir: LAPORAN_STATE.tanggalAkhir,
    kelasId: LAPORAN_STATE.kelasId, ustadzId: LAPORAN_STATE.ustadzId
  };

  call('getLaporanRekap', [filterRekap], function(rekap){
    renderLaporanSummary(rekap.summary);
    renderLaporanTable(rekap.rows);
    renderChartBar(rekap.rows);
    renderChartPie(rekap.summary);
  });
  call('getLaporanTren', [filterTren], function(tren){
    renderChartTren(tren);
  });
  call('getLaporanRekap', [{ tanggalMulai: LAPORAN_STATE.tanggalMulai, tanggalAkhir: LAPORAN_STATE.tanggalAkhir, groupBy: 'kelas' }], function(rekapKelas){
    renderChartKelasCompare(rekapKelas.rows);
  });
}

function renderLaporanSummary(s){
  function card(label, val){
    return '<div class="stat-card"><div class="mstripe"></div><div class="stat-label">'+label+'</div><div class="stat-num">'+val+'</div></div>';
  }
  document.getElementById('laporanSummary').innerHTML =
    card('Total Tercatat', s.total) + card('Hadir', s.hadir) + card('Telat', s.telat) + card('Izin', s.izin) +
    card('Sakit', s.sakit) + card('Alpha', s.alpha) + card('% Kehadiran', s.persenHadir + '%');
}

function renderLaporanTable(rows){
  const wrap = document.getElementById('laporanTable');
  if(!rows.length){ wrap.innerHTML = '<div class="empty-state">Belum ada data absensi pada periode ini.</div>'; return; }
  const labelKolom = LAPORAN_STATE.groupBy === 'santri' ? 'Santri' : (LAPORAN_STATE.groupBy === 'kelas' ? 'Kelas' : 'Ustadz');
  const clickable = LAPORAN_STATE.groupBy === 'santri';
  wrap.innerHTML = '<div class="table-wrap"><table><thead><tr>'+
    '<th>'+labelKolom+'</th><th>Hadir</th><th>Telat</th><th>Izin</th><th>Sakit</th><th>Alpha</th><th>Total</th><th>% Hadir</th>'+
    '</tr></thead><tbody>'+
    rows.map(function(r){
      const trAttr = clickable ? ' style="cursor:pointer;" onclick="navigate(\'santri-detail\',{santriId:\''+r.id+'\'})"' : '';
      const namaCell = clickable ? esc(r.nama)+' <span class="print-hide" style="color:var(--text-dim);font-size:11px;">→ lihat detail</span>' : esc(r.nama);
      const telatCell = r.telat + (r.telat && r.rataMenitTelat ? ' <span style="color:var(--text-dim);font-size:11px;">(avg '+r.rataMenitTelat+'m)</span>' : '');
      return '<tr'+trAttr+'><td>'+namaCell+'</td><td>'+r.hadir+'</td><td>'+telatCell+'</td><td>'+r.izin+'</td><td>'+r.sakit+'</td><td>'+r.alpha+'</td><td>'+r.total+'</td>'+
        '<td style="min-width:120px;"><div class="bar-track"><div class="bar-fill" style="width:'+r.persenHadir+'%;"></div></div>'+
        '<span style="font-size:11px;color:var(--text-dim);">'+r.persenHadir+'%</span></td></tr>';
    }).join('')+
    '</tbody></table></div>';
}

function renderChartTren(tren){
  const ctx = document.getElementById('chartTren').getContext('2d');
  if(CHART_TREN) CHART_TREN.destroy();
  const labelPrefix = tren.bucketType === 'month' ? 'Bulan ' : (tren.bucketType === 'week' ? 'Mgg ' : '');
  CHART_TREN = new Chart(ctx, {
    type: 'line',
    data: {
      labels: tren.labels.length ? tren.labels : ['-'],
      datasets: [
        {label:'Hadir', data:tren.hadir, borderColor:'#1FAA59', backgroundColor:'rgba(31,170,89,.15)', tension:.3, fill:true},
        {label:'Telat', data:tren.telat, borderColor:'#FF7A1A', backgroundColor:'rgba(255,122,26,.1)', tension:.3},
        {label:'Izin', data:tren.izin, borderColor:'#F2A900', backgroundColor:'rgba(242,169,0,.1)', tension:.3},
        {label:'Sakit', data:tren.sakit, borderColor:'#6E2585', backgroundColor:'rgba(110,37,133,.1)', tension:.3},
        {label:'Alpha', data:tren.alpha, borderColor:'#E4002B', backgroundColor:'rgba(228,0,43,.1)', tension:.3}
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:true,
      plugins:{ legend:{labels:{color:'#F2F2F3', font:{size:11}}} },
      scales:{
        x:{ticks:{color:'#9A9AA2', font:{size:10}}, grid:{color:'#2A2A2E'}},
        y:{ticks:{color:'#9A9AA2'}, grid:{color:'#2A2A2E'}, beginAtZero:true}
      }
    }
  });
}

function renderChartPie(summary){
  const ctx = document.getElementById('chartPie').getContext('2d');
  if(CHART_PIE) CHART_PIE.destroy();
  CHART_PIE = new Chart(ctx, {
    type:'doughnut',
    data:{
      labels:['Hadir','Telat','Izin','Sakit','Alpha'],
      datasets:[{data:[summary.hadir,summary.telat,summary.izin,summary.sakit,summary.alpha],
        backgroundColor:['#1FAA59','#FF7A1A','#F2A900','#6E2585','#E4002B'], borderColor:'#151518', borderWidth:2}]
    },
    options:{ responsive:true, maintainAspectRatio:true, plugins:{legend:{position:'bottom', labels:{color:'#F2F2F3', font:{size:11}}}} }
  });
}

function renderChartBar(rows){
  const labelKolom = LAPORAN_STATE.groupBy === 'santri' ? 'Persentase Kehadiran per Santri' :
    (LAPORAN_STATE.groupBy === 'kelas' ? 'Persentase Kehadiran per Kelas' : 'Persentase Kehadiran per Ustadz');
  document.getElementById('barTitle').textContent = labelKolom;

  const top = rows.slice(0, 25); // batasi biar chart tetap terbaca kalau santri banyak
  const ctx = document.getElementById('chartBar').getContext('2d');
  if(CHART_BAR) CHART_BAR.destroy();
  CHART_BAR = new Chart(ctx, {
    type:'bar',
    data:{
      labels: top.map(function(r){ return r.nama; }),
      datasets:[{label:'% Hadir', data: top.map(function(r){ return r.persenHadir; }), backgroundColor:'#0058A3', borderRadius:2}]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#9A9AA2', font:{size:10}}, grid:{display:false}},
        y:{ticks:{color:'#9A9AA2'}, grid:{color:'#2A2A2E'}, beginAtZero:true, max:100}
      }
    }
  });
}

function renderChartKelasCompare(kelasRows){
  const rows = kelasRows.filter(function(r){ return r.total > 0; }); // sembunyikan kelas yang memang tidak punya santri (mis. Kelas 7)
  const ctx = document.getElementById('chartKelasCompare').getContext('2d');
  if(CHART_KELAS) CHART_KELAS.destroy();
  const warna = ['#0058A3','#6E2585','#E4002B','#FF7A1A','#1FAA59'];
  CHART_KELAS = new Chart(ctx, {
    type:'bar',
    data:{
      labels: ['Hadir','Telat','Izin','Sakit','Alpha'],
      datasets: rows.map(function(r, i){
        return { label:r.nama, data:[r.hadir, r.telat, r.izin, r.sakit, r.alpha], backgroundColor: warna[i % warna.length], borderRadius:2 };
      })
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{legend:{labels:{color:'#F2F2F3', font:{size:11}}}},
      scales:{
        x:{ticks:{color:'#9A9AA2', font:{size:11}}, grid:{display:false}},
        y:{ticks:{color:'#9A9AA2'}, grid:{color:'#2A2A2E'}, beginAtZero:true}
      }
    }
  });
}

function muatDetailSantri(){

    const printLabel = document.getElementById('printDetailLabel');
    if(printLabel){
      printLabel.textContent = res.santri.nama + ' (' + res.santri.namaKelas + ') · ' +
        fmtTanggalIndo(DETAIL_STATE.tanggalMulai) + ' — ' + fmtTanggalIndo(DETAIL_STATE.tanggalAkhir);
    }

    function card(label, val){
      return '<div class="stat-card"><div class="mstripe"></div><div class="stat-label">'+label+'</div><div class="stat-num">'+val+'</div></div>';
    }
    document.getElementById('detailSummary').innerHTML =
      card('Total Tercatat', res.summary.total) + card('Hadir', res.summary.hadir) + card('Telat', res.summary.telat) + card('Izin', res.summary.izin) +
      card('Sakit', res.summary.sakit) + card('Alpha', res.summary.alpha) + card('% Kehadiran', res.summary.persenHadir + '%');

    renderChartDetailTren(res.tren);

    const wrap = document.getElementById('detailRiwayatTable');
    if(!res.riwayat.length){ wrap.innerHTML = '<div class="empty-state">Belum ada catatan absensi pada periode ini.</div>'; return; }
    wrap.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Tanggal</th><th>Hari</th><th>Kegiatan</th><th>Ustadz</th><th>Status</th><th>Keterangan</th></tr></thead><tbody>'+
      res.riwayat.map(function(r){
        const telatInfo = (r.status === 'Telat' && r.menitTelat) ? ' ('+r.menitTelat+' mnt)' : '';
        return '<tr><td>'+r.tanggal+'</td><td>'+esc(r.hari)+'</td><td>'+esc(r.namaKegiatan)+'</td><td>'+esc(r.namaUstadz)+'</td>'+
          '<td><span class="status-pill pill-'+r.status+'">'+r.status+telatInfo+'</span></td><td>'+esc(r.keterangan || '-')+'</td></tr>';
      }).join('')+
      '</tbody></table></div>';
  });
}

function renderChartDetailTren(tren){
  const ctx = document.getElementById('chartDetailTren').getContext('2d');
  if(CHART_DETAIL_TREN) CHART_DETAIL_TREN.destroy();
  CHART_DETAIL_TREN = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: tren.labels.length ? tren.labels : ['-'],
      datasets: [
        {label:'Hadir', data:tren.hadir, backgroundColor:'#1FAA59'},
        {label:'Telat', data:tren.telat, backgroundColor:'#FF7A1A'},
        {label:'Izin', data:tren.izin, backgroundColor:'#F2A900'},
        {label:'Sakit', data:tren.sakit, backgroundColor:'#6E2585'},
        {label:'Alpha', data:tren.alpha, backgroundColor:'#E4002B'}
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:true,
      plugins:{ legend:{labels:{color:'#F2F2F3', font:{size:11}}} },
      scales:{
        x:{stacked:true, ticks:{color:'#9A9AA2', font:{size:10}}, grid:{display:false}},
        y:{stacked:true, ticks:{color:'#9A9AA2'}, grid:{color:'#2A2A2E'}, beginAtZero:true}
      }
    }
  });
}

/* ============================================================
   RANKING KEDISIPLINAN (pekanan/bulanan/semesteran/tahunan)
============================================================ */
let RANKING_STATE = { periode: 'bulanan', tanggalMulai: '', tanggalAkhir: '', kelasId: '' };

function renderAdminRanking(){
  const c = document.getElementById('content');
  const kelasOpt = REF.kelas.map(function(k){ return '<option value="'+k.KelasID+'">'+esc(k.NamaKelas)+'</option>'; }).join('');

  c.innerHTML =
    '<h1 class="page-title">Ranking Kedisiplinan</h1>'+
    '<p class="page-sub">Santri paling rajin, paling sering telat, dan paling sering alpha.</p>'+
    '<div class="pill-group" id="rankingPeriodePills">'+
      rankingPeriodeBtn('pekanan','Pekanan')+ rankingPeriodeBtn('bulanan','Bulanan')+
      rankingPeriodeBtn('semesteran','Semesteran')+ rankingPeriodeBtn('tahunan','Tahunan')+
      rankingPeriodeBtn('custom','Custom')+
    '</div>'+
    '<div class="filter-bar" id="rankingCustomRangeWrap" style="display:none;">'+
      '<input type="date" id="rTglMulai"><input type="date" id="rTglAkhir">'+
      '<button class="btn btn-outline btn-sm" onclick="terapkanRankingCustomRange()">Terapkan</button>'+
    '</div>'+
    '<div class="filter-bar">'+
      '<select id="rKelasFilter" onchange="muatRanking()"><option value="">Semua Kelas</option>'+kelasOpt+'</select>'+
    '</div>'+
    '<p class="page-sub" id="rankingPeriodeLabel"></p>'+
    '<div class="rank-grid" id="rankingGrid"><div class="empty-state">Memuat...</div></div>';

  setRankingPeriode(RANKING_STATE.periode || 'bulanan');
}

function rankingPeriodeBtn(id, label){
  return '<button class="pill-btn" data-rperiode="'+id+'" onclick="setRankingPeriode(\''+id+'\')">'+label+'</button>';
}

function setRankingPeriode(periode){
  RANKING_STATE.periode = periode;
  document.querySelectorAll('#rankingPeriodePills .pill-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-rperiode') === periode);
  });
  document.getElementById('rankingCustomRangeWrap').style.display = periode === 'custom' ? 'flex' : 'none';

  if(periode === 'custom'){
    if(!RANKING_STATE.tanggalMulai){
      document.getElementById('rTglMulai').value = todayStr();
      document.getElementById('rTglAkhir').value = todayStr();
    }
    return;
  }
  call('getRentangPeriode', [periode, todayStr()], function(range){
    RANKING_STATE.tanggalMulai = range.tanggalMulai;
    RANKING_STATE.tanggalAkhir = range.tanggalAkhir;
    muatRanking();
  });
}

function terapkanRankingCustomRange(){
  RANKING_STATE.tanggalMulai = document.getElementById('rTglMulai').value;
  RANKING_STATE.tanggalAkhir = document.getElementById('rTglAkhir').value;
  if(!RANKING_STATE.tanggalMulai || !RANKING_STATE.tanggalAkhir){ toast('Isi tanggal mulai & akhir', 'error'); return; }
  muatRanking();
}

function muatRanking(){
  RANKING_STATE.kelasId = document.getElementById('rKelasFilter').value;
  document.getElementById('rankingPeriodeLabel').textContent =
    fmtTanggalIndo(RANKING_STATE.tanggalMulai) + '  —  ' + fmtTanggalIndo(RANKING_STATE.tanggalAkhir);

  call('getRankingKedisiplinan', [{ tanggalMulai: RANKING_STATE.tanggalMulai, tanggalAkhir: RANKING_STATE.tanggalAkhir, kelasId: RANKING_STATE.kelasId }], function(res){
    document.getElementById('rankingGrid').innerHTML =
      rankCard('🏅 Paling Rajin', res.rajin, function(r){ return r.persenHadir + '% hadir'; }) +
      rankCard('⏰ Paling Sering Telat', res.telat, function(r){ return r.telat + 'x · avg ' + r.rataMenitTelat + 'm'; }) +
      rankCard('🚫 Paling Sering Alpha', res.alpha, function(r){ return r.alpha + 'x alpha'; });
  });
}

function rankCard(judul, rows, valFn){
  const medals = ['🥇','🥈','🥉'];
  const body = rows.length
    ? rows.map(function(r, i){
        const medal = medals[i] || ('#'+(i+1));
        return '<div class="rank-row" onclick="navigate(\'santri-detail\',{santriId:\''+r.id+'\'})">'+
          '<span class="rank-medal">'+medal+'</span><span class="rank-nama">'+esc(r.nama)+'</span>'+
          '<span class="rank-val">'+valFn(r)+'</span></div>';
      }).join('')
    : '<div class="empty-state">Belum ada data pada periode ini.</div>';
  return '<div class="rank-card"><div class="rank-card-head">'+judul+'</div>'+body+'</div>';
}

    const ctx = document.getElementById('chartWaliTren').getContext('2d');

      type:'bar',

        labels: res.tren.labels.length ? res.tren.labels : ['-'],

          {label:'Hadir', data:res.tren.hadir, backgroundColor:'#1FAA59'},
          {label:'Telat', data:res.tren.telat, backgroundColor:'#FF7A1A'},
          {label:'Izin', data:res.tren.izin, backgroundColor:'#F2A900'},
          {label:'Sakit', data:res.tren.sakit, backgroundColor:'#6E2585'},
          {label:'Alpha', data:res.tren.alpha, backgroundColor:'#E4002B'}
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:true,
        plugins:{legend:{labels:{color:'#F2F2F3', font:{size:11}}}},
        scales:{
          x:{stacked:true, ticks:{color:'#9A9AA2', font:{size:10}}, grid:{display:false}},
          y:{stacked:true, ticks:{color:'#9A9AA2'}, grid:{color:'#2A2A2E'}, beginAtZero:true}
        }
      }
    });

    const wrap = document.getElementById('waliRiwayatTable');
    if(!res.riwayat.length){ wrap.innerHTML = '<div class="empty-state">Belum ada catatan absensi pada periode ini.</div>'; return; }
    wrap.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Tanggal</th><th>Hari</th><th>Kegiatan</th><th>Ustadz</th><th>Status</th><th>Keterangan</th></tr></thead><tbody>'+
      res.riwayat.map(function(r){
        const telatInfo = (r.status === 'Telat' && r.menitTelat) ? ' ('+r.menitTelat+' mnt)' : '';
        return '<tr><td>'+r.tanggal+'</td><td>'+esc(r.hari)+'</td><td>'+esc(r.namaKegiatan)+'</td><td>'+esc(r.namaUstadz)+'</td>'+
          '<td><span class="status-pill pill-'+r.status+'">'+r.status+telatInfo+'</span></td><td>'+esc(r.keterangan || '-')+'</td></tr>';
      }).join('')+
      '</tbody></table></div>';
  });
}
</script>
